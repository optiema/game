            const activeEnemies = enemies.filter(e => e.state !== 'captured_squad');
            
            if (activeEnemies.length === 0 && (gameState === STATES.PLAYING || gameState === STATES.CHALLENGE)) {
                // Stage cleared!
                gameState = STATES.STAGE_COMPLETE;
                starSpeedMultiplier = 8; // hyperdrive star effect
                sound.playMelody('stage_clear');
                
                setTimeout(() => {
                    currentStage++;
                    starSpeedMultiplier = 1;
                    createStageWaves();
                    gameState = STATES.INTRO;
                }, 4000);
            }
        }

        // --- Wave Intros / Fly-in setups ---
        function updateIntroSequence() {
            // Count spawning or flying-in enemies
            const processing = enemies.some(a => a.state === 'spawning' || a.state === 'flying_in');
            
            if (!processing) {
                // All enemies have settled in grid
                formationEntranceActive = false;
                gameState = (currentStage % 3 === 0) ? STATES.CHALLENGE : STATES.PLAYING;
                diveTimer = 0;
            }
        }

        // --- Menu, HUD, Overlay Draws ---
        function drawMenuScreen() {
            // Title logo with glow
            ctx.shadowColor = '#00f0ff';
            ctx.shadowBlur = 15;
            
            const gradient = ctx.createLinearGradient(0, 150, 0, 250);
            gradient.addColorStop(0, '#ffd700');
            gradient.addColorStop(0.5, '#ff3300');
            gradient.addColorStop(1, '#ff0077');
            
            ctx.fillStyle = gradient;
            ctx.font = '42px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText("GALAGA", 300, 220);
            ctx.shadowBlur = 0; // reset

            // Subtitle
            ctx.fillStyle = '#00ffc8';
            ctx.font = '10px "Press Start 2P"';
            ctx.fillText("CLASSIC ARCADE REMAKE", 300, 260);

            // Insert Coin Flashing
            if (Math.floor(Date.now() / 600) % 2 === 0) {
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px "Press Start 2P"';
                ctx.fillText("PRESS ENTER TO START", 300, 420);
            }

            // Controls instruction
            ctx.fillStyle = '#8888aa';
            ctx.font = '9px "Press Start 2P"';
            ctx.fillText("KEYBOARD: A/D OR ARROWS TO MOVE", 300, 520);
            ctx.fillText("SPACE TO FIRE", 300, 545);

            // Credit
            ctx.fillStyle = '#ffd700';
            ctx.fillText("INSERT COIN OR PRESS TO INITIALIZE AUDIO", 300, 680);
        }

        function drawStageCompleteScreen() {
            ctx.fillStyle = '#ffd700';
            ctx.font = '22px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText(`STAGE ${currentStage} CLEAR`, 300, 320);

            if (currentStage % 3 === 0) {
                ctx.font = '12px "Press Start 2P"';
                ctx.fillStyle = '#00ffaa';
                ctx.fillText(`CHALLENGE STAGE COMPLETED`, 300, 380);
                
                const percent = Math.round((challengeKilled / totalChallengeEnemies) * 100) || 0;
                ctx.fillText(`KILLED: ${challengeKilled} / ${totalChallengeEnemies} (${percent}%)`, 300, 420);
                
                if (percent === 100) {
                    ctx.fillStyle = '#ffff00';
                    ctx.font = '16px "Press Start 2P"';
                    ctx.fillText("PERFECT BONUS 10,000 PTS!", 300, 470);
                }
            } else {
                ctx.font = '11px "Press Start 2P"';
                ctx.fillStyle = '#ffffff';
                ctx.fillText("WARPING TO NEXT SECTOR...", 300, 380);
            }
        }

        function drawGameOverScreen() {
            ctx.fillStyle = '#ff0055';
            ctx.font = '28px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText("GAME OVER", 300, 240);

            // Display Statistics
            ctx.fillStyle = '#ffffff';
            ctx.font = '10px "Press Start 2P"';
            ctx.textAlign = 'left';

            const startX = 160;
            ctx.fillText(`- SCORE:      ${score.toLocaleString()}`, startX, 340);
            ctx.fillText(`- STAGE:      ${currentStage}`, startX, 380);
            ctx.fillText(`- SHOTS FIRED: ${totalShotsFired}`, startX, 420);
            ctx.fillText(`- TOTAL HITS:  ${totalHits}`, startX, 460);

            const ratio = totalShotsFired > 0 ? ((totalHits / totalShotsFired) * 100).toFixed(1) : 0;
            ctx.fillText(`- HIT RATIO:  ${ratio}%`, startX, 500);

            // Flash restart instruction
            if (Math.floor(Date.now() / 600) % 2 === 0) {
                ctx.fillStyle = '#ffd700';
                ctx.textAlign = 'center';
                ctx.fillText("PRESS ENTER FOR RETRY", 300, 620);
            }
        }

        function drawHighScoreEntryScreen() {
            ctx.fillStyle = '#ffd700';
            ctx.font = '20px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText("NEW HIGH SCORE!", 300, 240);

            ctx.fillStyle = '#ffffff';
            ctx.font = '14px "Press Start 2P"';
            ctx.fillText(`SCORE: ${score.toLocaleString()}`, 300, 300);

            ctx.font = '11px "Press Start 2P"';
            ctx.fillText("ENTER YOUR NAME:", 300, 380);

            // Render name entry box
            ctx.font = '28px "Press Start 2P"';
            ctx.fillStyle = '#00f0ff';
            
            // Format letters (e.g. A B C with bottom dashes)
            let displayStr = "";
            for (let i = 0; i < 3; i++) {
                if (i < scoreNameEntry.length) {
                    displayStr += scoreNameEntry[i] + " ";
                } else {
                    displayStr += "_ ";
                }
            }
            ctx.fillText(displayStr.trim(), 300, 450);

            ctx.font = '9px "Press Start 2P"';
            ctx.fillStyle = '#8888aa';
            ctx.fillText("TYPE LETTERS AND PRESS ENTER TO CONFIRM", 300, 520);
        }

        // --- HUD Overlay Draws on main loop ---
        // We draw simple floating scores and live counters on the canvas itself
        function drawHUDOverlay() {
            if (gameState === STATES.MENU || gameState === STATES.HIGHSCORE_ENTRY) return;

            // Score HUD top-left
            ctx.fillStyle = '#ffffff';
            ctx.font = '10px "Press Start 2P"';
            ctx.textAlign = 'left';
            ctx.fillText("SCORE", 20, 30);
            ctx.fillStyle = '#00f0ff';
            ctx.fillText(score.toLocaleString(), 20, 50);

            // High Score HUD center-top
            ctx.fillStyle = '#ff0055';
            ctx.textAlign = 'center';
            ctx.fillText("HIGH SCORE", 300, 30);
            ctx.fillStyle = '#ffffff';
            const highest = highScores.length > 0 ? Math.max(score, highScores[0].score) : score;
            ctx.fillText(highest.toLocaleString(), 300, 50);

            // Lives indicators top-right (as tiny ship icons)
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'right';
            ctx.fillText("LIVES", 580, 30);
            
            const liveW = 16;
            const liveH = 16;
            for (let i = 0; i < player.livesCount - 1; i++) {
                drawPlayerShip(ctx, 580 - (i * (liveW + 8)) - liveW/2, 50, liveW, liveH, false);
            }
        }

        // Add drawHUDOverlay into entities drawings
        const originalDrawEntities = drawEntities;
        drawEntities = function() {
            originalDrawEntities();
            drawHUDOverlay();
        }

        // --- Setup Option Event Listeners ---
        document.getElementById('sound-toggle').addEventListener('change', e => {
            sound.muted = !e.target.checked;
            sound.init(); // Initialize context when toggled
        });

        document.getElementById('crt-toggle').addEventListener('change', e => {
            const container = document.getElementById('screen-container');
            if (e.target.checked) {
                container.classList.remove('no-crt');
                container.classList.add('crt-glow');
            } else {
                container.classList.add('no-crt');
                container.classList.remove('crt-glow');
            }
        });

        document.getElementById('btn-restart').addEventListener('click', () => {
            sound.init();
            resetGame();
        });

        // Initialize game resources
        loadHighScores();
        initStars();
        
        // Start animation loop
        requestAnimationFrame(loop);
    </script>
</body>
</html>
